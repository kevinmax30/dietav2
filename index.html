<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="theme-color" content="#1a3a08"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Mi Nutrición"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>Mi Nutrición Familiar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --g0:#0f2205;--g1:#1a3a08;--g2:#2D5016;--g3:#4a7c1e;--g4:#7ab648;--g5:#b8e08a;
  --t1:#164554;--t2:#1d6b7a;--t3:#3a9fb0;
  --amb:#b87010;--amb2:#e8a030;
  --red:#b8352a;--red2:#e05040;
  --pur:#5a2d82;--pur2:#8a50c8;
  --ora:#b84a10;--ora2:#e07030;
  --cream:#f6f1e9;--c1:#eee8dc;--c2:#ddd5c5;--c3:#c8bfae;
  --ink:#18180f;--mid:#4a4840;--muted:#8a857a;--ghost:#b8b0a5;
  --r-xl:20px;--r-lg:16px;--r-md:12px;--r-sm:8px;
  --sh:0 2px 20px rgba(15,34,5,.10);--sh-lg:0 8px 32px rgba(15,34,5,.16);
  --dur:.2s;--ease:cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden;padding-bottom:80px;-webkit-font-smoothing:antialiased}
input,select,textarea,button{font-family:inherit}

/* ── HEADER ── */
header{
  background:linear-gradient(160deg,var(--g0) 0%,var(--g1) 100%);
  padding:env(safe-area-inset-top,0) 0 0;
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 0 rgba(255,255,255,.06);
}
.header-inner{display:flex;align-items:center;gap:10px;padding:14px 18px 13px}
.back-btn{background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.9);width:36px;height:36px;border-radius:50%;font-size:22px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;transition:background var(--dur)}
.back-btn.visible{display:flex}
.back-btn:active{background:rgba(255,255,255,.22)}
.hdr-text{flex:1;min-width:0}
.hdr-title{font-family:'Fraunces',serif;font-size:19px;color:#fff;font-weight:700;line-height:1.15;letter-spacing:-.3px}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.hdr-badge{background:var(--g4);color:var(--g0);font-size:10px;font-weight:800;padding:3px 8px;border-radius:20px;letter-spacing:.3px;flex-shrink:0}

/* ── NAV ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,.96);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-top:1px solid var(--c1);
  display:flex;z-index:100;
  padding-bottom:env(safe-area-inset-bottom,0);
}
.nav-item{flex:1;border:none;background:none;padding:9px 2px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--ghost);transition:color var(--dur)}
.nav-item .ni-icon{font-size:19px;transition:transform var(--dur)}
.nav-item .ni-label{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.nav-item.active{color:var(--g2)}
.nav-item.active .ni-icon{transform:translateY(-1px)}

/* ── MAIN ── */
#mainContent{padding:16px;animation:fadeUp .22s var(--ease)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── TYPE ── */
.label{font-size:10px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;margin-top:2px}
.heading{font-family:'Fraunces',serif;font-size:22px;font-weight:700;letter-spacing:-.4px;line-height:1.2}

/* ── CHIPS / TAGS ── */
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.chip-green{background:rgba(74,124,30,.12);color:var(--g2)}
.chip-teal{background:rgba(29,107,122,.12);color:var(--t2)}
.chip-red{background:rgba(184,53,42,.1);color:var(--red)}
.chip-amber{background:rgba(184,112,16,.12);color:var(--amb)}
.chip-pur{background:rgba(90,45,130,.1);color:var(--pur)}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--r-xl);box-shadow:var(--sh);overflow:hidden}
.card-pad{padding:16px 18px}

/* ── HOME STATS ── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat-box{background:#fff;border-radius:var(--r-lg);padding:11px 6px;text-align:center;box-shadow:var(--sh)}
.stat-n{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--g2);line-height:1}
.stat-l{font-size:9px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;font-weight:600}

/* ── HOME GRID ── */
.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px}
.hc{border:none;cursor:pointer;border-radius:var(--r-xl);padding:18px 15px;text-align:left;color:#fff;transition:transform var(--dur),box-shadow var(--dur)}
.hc:active{transform:scale(.97)}
.hc.g{background:linear-gradient(140deg,var(--g0),var(--g2),var(--g3))}
.hc.t{background:linear-gradient(140deg,#0d3040,var(--t2),var(--t3))}
.hc.a{background:linear-gradient(140deg,#3a1a00,var(--amb),var(--amb2))}
.hc.r{background:linear-gradient(140deg,#3a0808,var(--red),var(--red2))}
.hc.p{background:linear-gradient(140deg,#2a0850,var(--pur),var(--pur2))}
.hc-e{font-size:28px;display:block;margin-bottom:8px}
.hc-t{font-family:'Fraunces',serif;font-size:15px;font-weight:700;display:block;line-height:1.2}
.hc-s{font-size:10px;color:rgba(255,255,255,.65);margin-top:3px;display:block}

/* ── CYCLE CARD ── */
.cycle-card{background:linear-gradient(140deg,var(--g0),var(--g1));border-radius:var(--r-xl);padding:18px;color:#fff;margin-bottom:16px;box-shadow:var(--sh-lg)}
.cycle-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.cycle-title{font-family:'Fraunces',serif;font-size:17px;font-weight:700}
.cycle-sub{font-size:11px;opacity:.6;margin-top:2px}
.cycle-badge{background:rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:700}
.cycle-days{font-family:'Fraunces',serif;font-size:44px;font-weight:900;line-height:1;margin-bottom:4px}
.cycle-days-lbl{font-size:11px;opacity:.6;letter-spacing:.4px;text-transform:uppercase}
.cycle-bar-wrap{background:rgba(255,255,255,.12);border-radius:20px;height:6px;margin-top:14px;overflow:hidden}
.cycle-bar{background:var(--g4);height:100%;border-radius:20px;transition:width .6s var(--ease)}
.cycle-next{font-size:11px;opacity:.55;margin-top:10px}

/* ── DATA BUTTONS ── */
.data-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.btn-ghost{background:#fff;border:1.5px solid var(--c2);border-radius:var(--r-md);padding:10px 13px;font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background var(--dur)}
.btn-ghost:active{background:var(--c1)}

/* ── BUTTONS ── */
.btn{border:none;border-radius:var(--r-md);padding:13px 18px;font-size:14px;font-weight:700;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:7px;transition:all var(--dur)}
.btn-primary{background:var(--g2);color:#fff}.btn-primary:active{background:var(--g1)}
.btn-secondary{background:var(--c1);color:var(--ink)}.btn-secondary:active{background:var(--c2)}
.btn-danger{background:rgba(184,53,42,.1);color:var(--red);border:1.5px solid rgba(184,53,42,.2)}.btn-danger:active{background:rgba(184,53,42,.18)}
.btn-sm{padding:9px 14px;font-size:12px;font-weight:700;border-radius:var(--r-sm)}
.btn-confirm{background:var(--g4);color:var(--g0);border:none;border-radius:var(--r-md);padding:10px 16px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-confirm:active{background:var(--g3);color:#fff}

.fab{position:fixed;bottom:88px;right:17px;z-index:90;width:52px;height:52px;border-radius:50%;border:none;background:var(--g2);color:#fff;font-size:26px;box-shadow:0 4px 18px rgba(45,80,22,.38);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--dur),transform var(--dur)}
.fab:active{background:var(--g1);transform:scale(.95)}

/* ── PLAN TABS ── */
.plan-tabs{display:flex;gap:7px;margin-bottom:16px}
.plan-tab{flex:1;padding:10px 4px;border:2px solid var(--c2);border-radius:var(--r-md);font-size:11px;font-weight:700;cursor:pointer;background:#fff;color:var(--muted);text-align:center;transition:all var(--dur)}
.plan-tab:active{transform:scale(.97)}
.plan-tab.pt-deficit{border-color:var(--g2);background:#eaf5df;color:var(--g2)}
.plan-tab.pt-mantenimiento{border-color:var(--t2);background:#dff0f5;color:var(--t2)}
.plan-tab.pt-volumen{border-color:var(--pur);background:#f0e8fa;color:var(--pur)}

/* ── FOOD TABLE ── */
.table-wrap{background:#fff;border-radius:var(--r-xl);box-shadow:var(--sh);overflow:hidden}
.table-search{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--c1)}
.table-search input{border:none;outline:none;flex:1;font-size:14px;background:transparent;color:var(--ink)}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead tr{background:var(--cream)}
.tbl th{padding:8px 7px;text-align:right;font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap}
.tbl th:first-child{text-align:left;padding-left:14px;min-width:100px}
.tbl td{padding:10px 7px;text-align:right;border-bottom:1px solid var(--c1);vertical-align:middle}
.tbl td:first-child{text-align:left;padding-left:14px;font-weight:600;font-size:13px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr{cursor:pointer;transition:background var(--dur)}
.tbl tr:active td{background:var(--cream)}
.kcal-c{font-weight:700;color:var(--amb)}
.prot-c{color:var(--g2);font-weight:600}
.carb-c{color:var(--t2);font-weight:600}
.fat-c{color:var(--muted);font-weight:600}

/* ── MENU CARDS ── */
.menu-list{display:flex;flex-direction:column;gap:9px}
.menu-card{background:#fff;border-radius:var(--r-xl);padding:13px 14px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;cursor:pointer;border:none;text-align:left;width:100%;transition:transform var(--dur)}
.menu-card:active{transform:scale(.98)}
.menu-thumb{width:46px;height:46px;border-radius:var(--r-md);background:var(--c1);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.menu-info{flex:1;min-width:0}
.menu-name{font-weight:700;font-size:14px;letter-spacing:-.1px}
.menu-dots{display:flex;gap:5px;margin-top:4px;align-items:center}
.mini-dot{width:6px;height:6px;border-radius:50%;background:var(--c2);display:inline-block;transition:background var(--dur)}
.mini-dot.on{background:var(--g4)}
.menu-arr{color:var(--c3);font-size:20px;font-weight:700;flex-shrink:0}

/* ── PERSON TABS ── */
.person-tabs{display:flex;gap:8px;margin-bottom:16px}
.person-tab{flex:1;background:#fff;border-radius:var(--r-md);padding:9px 4px;box-shadow:var(--sh);text-align:center;cursor:pointer;border:2px solid transparent;transition:all var(--dur)}
.person-tab.active{border-color:var(--g4);background:#f0f8e8}
.pt-avatar{width:36px;height:36px;border-radius:50%;margin:0 auto 4px;overflow:hidden}
.pt-name{font-size:11px;font-weight:700}

/* ── MEAL SECTIONS ── */
.meal-section{margin-bottom:14px}
.meal-header{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.meal-header-line{flex:1;height:1px;background:var(--c2)}
.meal-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:4px}
.edit-meal-btn{background:none;border:none;font-size:15px;cursor:pointer;color:var(--muted);padding:2px 5px;opacity:.7;transition:opacity var(--dur)}
.edit-meal-btn:active{opacity:1}
.edit-meal-btn.hidden{display:none}

.meal-table-wrap{background:#fff;border-radius:var(--r-lg);box-shadow:var(--sh);overflow:hidden}
.meal-tbl{width:100%;border-collapse:collapse;font-size:12px}
.meal-tbl th{background:var(--cream);padding:7px 6px;text-align:right;font-size:9px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.meal-tbl th:first-child{text-align:left;padding-left:12px}
.meal-tbl td{padding:9px 6px;text-align:right;border-bottom:1px solid var(--c1)}
.meal-tbl td:first-child{text-align:left;padding-left:12px;font-weight:600;font-size:12px}
.meal-tbl tr:last-child td{border-bottom:none}
.grams-input{width:52px;border:1.5px solid var(--c2);border-radius:6px;padding:4px;font-size:12px;text-align:center;background:#fff;transition:border-color var(--dur)}
.grams-input:focus{outline:none;border-color:var(--g4)}
.remove-btn{background:none;border:none;color:var(--ghost);font-size:15px;cursor:pointer;padding:1px 4px;transition:color var(--dur)}
.remove-btn:active{color:var(--red)}
.add-row{padding:7px 10px}
.add-btn{background:none;border:1.5px dashed var(--c2);border-radius:7px;width:100%;padding:7px;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;transition:all var(--dur)}
.add-btn:active{background:var(--cream);border-color:var(--g4);color:var(--g2)}

/* Edit mode toolbar */
.edit-toolbar{background:#fff;border-radius:var(--r-xl);box-shadow:var(--sh-lg);padding:12px 16px;margin-bottom:14px;display:none;align-items:center;justify-content:space-between;gap:10px;border:1.5px solid var(--g4)}
.edit-toolbar.visible{display:flex}
.edit-toolbar-text{font-size:12px;font-weight:600;color:var(--g2)}

/* ── TOTALS TABLE (green) ── */
.totals-wrap{background:linear-gradient(140deg,var(--g0),var(--g1));border-radius:var(--r-xl);padding:16px;color:#fff;margin-top:16px;box-shadow:var(--sh-lg)}
.totals-title{font-size:10px;font-weight:800;opacity:.6;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.totals-tbl{width:100%;border-collapse:collapse;font-size:11px;color:#fff}
.totals-tbl th{text-align:right;font-size:9px;font-weight:800;opacity:.6;text-transform:uppercase;padding-bottom:7px;letter-spacing:.5px}
.totals-tbl th:first-child{text-align:left}
.totals-tbl td{text-align:right;font-weight:600;padding:4px 0;font-size:12px;opacity:.88}
.totals-tbl td:first-child{text-align:left;font-size:11px;font-weight:500;opacity:.72}
.totals-tbl tr.grand td{border-top:1px solid rgba(255,255,255,.18);padding-top:9px;font-size:13px;font-weight:800;opacity:1}
.totals-tbl tr.grand td:first-child{font-size:12px;font-weight:700}
.macro-pct-row{display:flex;gap:10px;margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.15)}
.mpct-item{flex:1;text-align:center}
.mpct-bar-wrap{background:rgba(255,255,255,.15);border-radius:20px;height:4px;margin-bottom:5px;overflow:hidden}
.mpct-bar{height:100%;border-radius:20px}
.mpct-bar.prot{background:var(--g4)}
.mpct-bar.carb{background:var(--t3)}
.mpct-bar.fat{background:var(--amb2)}
.mpct-val{font-size:13px;font-weight:800}
.mpct-lbl{font-size:9px;opacity:.6;text-transform:uppercase;letter-spacing:.4px;margin-top:1px}

/* ── PROGRESS ── */
.prog-persons{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.prog-card{background:#fff;border-radius:var(--r-xl);padding:14px 8px 12px;box-shadow:var(--sh);text-align:center;cursor:pointer;transition:transform var(--dur)}
.prog-card:active{transform:scale(.97)}
.prog-avatar{width:48px;height:48px;border-radius:50%;margin:0 auto 7px;overflow:hidden}
.prog-name{font-size:12px;font-weight:700;letter-spacing:-.1px}
.prog-last{font-size:10px;color:var(--muted);margin-top:3px}
.entry-list{display:flex;flex-direction:column;gap:8px}
.entry-row{background:#fff;border-radius:var(--r-lg);padding:12px 13px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px}
.entry-date{width:52px;flex-shrink:0}
.entry-date .d1{font-size:15px;font-weight:800;font-family:'Fraunces',serif}
.entry-date .d2{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.entry-vals{flex:1;display:flex;flex-direction:column;gap:4px}
.entry-measure-row{display:flex;gap:10px;flex-wrap:wrap}
.ev-item{font-size:11px;display:flex;align-items:center;gap:4px}
.ev-name{color:var(--mid)}
.ev-val{font-weight:700}
.ev-delta{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;padding:1px 5px;border-radius:10px}
.ev-up{background:rgba(184,53,42,.1);color:var(--red)}
.ev-down{background:rgba(74,124,30,.1);color:var(--g2)}
.ev-same{background:var(--c1);color:var(--muted)}
.entry-del{background:none;border:none;color:var(--ghost);font-size:14px;cursor:pointer}

/* ── CREATOR ── */
.creator-top{display:flex;gap:8px;margin-bottom:14px}
.creator-top button{flex:1}

/* ── MODAL / SHEET ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.sheet{background:var(--cream);width:100%;max-width:480px;border-radius:22px 22px 0 0;padding:18px 18px max(22px,env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;animation:sheetUp .22s var(--ease)}
@keyframes sheetUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--c2);border-radius:4px;margin:0 auto 14px}
.sheet-title{font-family:'Fraunces',serif;font-size:19px;font-weight:700;margin-bottom:14px;letter-spacing:-.3px}
.field{margin-bottom:12px}
.field label{font-size:10px;font-weight:800;color:var(--muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.field input,.field select{width:100%;border:1.5px solid var(--c2);border-radius:var(--r-md);padding:11px 13px;font-size:14px;background:#fff;outline:none;color:var(--ink);transition:border-color var(--dur)}
.field input:focus,.field select:focus{border-color:var(--g4)}
.field-row{display:flex;gap:9px}
.field-row .field{flex:1}
.sheet-actions{display:flex;gap:9px;margin-top:10px}
.sheet-actions button{flex:1}

/* ── PICKER ── */
.picker-search{display:flex;align-items:center;gap:8px;background:#fff;border-radius:var(--r-md);padding:9px 13px;border:1.5px solid var(--c2);margin-bottom:10px}
.picker-search input{border:none;outline:none;flex:1;font-size:13px;color:var(--ink)}
.picker-list{max-height:40vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.picker-row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff;border-radius:var(--r-sm);padding:9px 12px;border:1.5px solid var(--c2);cursor:pointer;transition:background var(--dur)}
.picker-row:active{background:var(--cream)}
.picker-row .fn{font-size:13px;font-weight:600}
.picker-row .fc{font-size:10px;color:var(--muted);margin-top:1px}

/* ── MISC ── */
.empty-state{text-align:center;padding:30px 16px;color:var(--muted)}
.empty-state .es-icon{font-size:40px;margin-bottom:10px}
.empty-state p{font-size:13px;line-height:1.65}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:28px;font-size:13px;font-weight:600;z-index:300;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;box-shadow:var(--sh-lg)}

function getCycleInfo(){
  const cfg=getCycleCfg();
  const DEFICIT_DAYS=cfg.deficitWeeks*7;
  const MANT_DAYS=cfg.mantWeeks*7;
  const CYCLE_TOTAL=DEFICIT_DAYS+MANT_DAYS;
  const today=new Date();today.setHours(0,0,0,0);
  const start=new Date(cfg.startDate);start.setHours(0,0,0,0);
  const diffDays=Math.floor((today-start)/86400000);
  // position within cycle, offset by startPhase
  const startOffset=cfg.startPhase==='mantenimiento'?0:MANT_DAYS;
  const pos=((diffDays+startOffset)%CYCLE_TOTAL+CYCLE_TOTAL)%CYCLE_TOTAL;
  let phase,daysIn,daysLeft,daysTotal,nextPhase;
  if(pos<MANT_DAYS){
    phase='mantenimiento';daysIn=pos;daysLeft=MANT_DAYS-pos-1;daysTotal=MANT_DAYS;nextPhase='Déficit';
  } else {
    phase='deficit';daysIn=pos-MANT_DAYS;daysLeft=DEFICIT_DAYS-(pos-MANT_DAYS)-1;daysTotal=DEFICIT_DAYS;nextPhase='Mantenimiento';
  }
  const pct=Math.round((daysIn/daysTotal)*100);
  const nextDate=new Date(today);nextDate.setDate(today.getDate()+daysLeft+1);
  const mn=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  const nextFmt=`${nextDate.getDate()} ${mn[nextDate.getMonth()]}`;
  const mantW=cfg.mantWeeks;const defW=cfg.deficitWeeks;
  return{phase,daysIn,daysLeft,daysTotal,pct,nextPhase,nextFmt,mantW,defW};
}

function saveCycleConfig(){
  const startDate=document.getElementById('cfgDate').value;
  const startPhase=document.getElementById('cfgPhase').value;
  const deficitWeeks=parseInt(document.getElementById('cfgDef').value)||12;
  const mantWeeks=parseInt(document.getElementById('cfgMant').value)||2;
  if(!startDate){alert('Pon una fecha de inicio.');return;}
  DB.cycleConfig={startDate,startPhase,deficitWeeks,mantWeeks};
  saveDB();closeAll();renderHome();toast('Ciclo actualizado ✓');
}

      <button class="btn-ghost" onclick="exportBackup()">⬇️ Exportar</button>
      <button class="btn-ghost" onclick="document.getElementById('impBI').click()">⬆️ Importar</button>
    </div>
    <input type="file" id="impBI" accept="application/json" style="display:none" onchange="importBackup(event)">

}
function exportBackup(){
  const b=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download=`nutricion-${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(u);toast('Copia exportada ✓');
}
function importBackup(evt){
  const file=evt.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=()=>{try{
    const d=JSON.parse(r.result);
    if(!d.foods||!d.menus)throw 0;
    DB=d;PERSONS.forEach(p=>{if(!DB.progress[p.id])DB.progress[p.id]=[];});
    if(!DB.customFields)DB.customFields=[];
    saveDB();toast('Importado ✓');renderHome();
  }catch(e){alert('Archivo inválido.');}};
  r.readAsText(file);evt.target.value='';
}

function openFoodImport(){
  const ov=mkOv(`<div class="sheet-handle"></div>
    <div class="sheet-title">📥 Importar Excel</div>
    <p style="font-size:13px;color:var(--mid);line-height:1.6;margin-bottom:14px">
      Archivo <strong>.xlsx</strong> con hoja <strong>ALIMENTOS</strong>.<br>
      Columnas: <code style="background:var(--c1);padding:2px 6px;border-radius:5px;font-size:11px">Alimento · Proteína · Carbohidratos · Grasas · Calorías</code><br>
      Valores por 100g.
    </p>
    <input type="file" id="xlIn" accept=".xlsx,.xls" style="margin-bottom:12px">
    <div id="xlSt" style="font-size:12px;color:var(--muted);min-height:18px;margin-bottom:8px"></div>
    <div class="sheet-actions">
      <button class="btn btn-secondary" onclick="this.closest('.overlay').remove()">Cancelar</button>
      <button class="btn btn-primary" onclick="doExcelImport()">Importar</button>
    </div>
  `);document.body.appendChild(ov);
}
function doExcelImport(){
  const inp=document.getElementById('xlIn');const st=document.getElementById('xlSt');
  if(!inp.files[0]){st.textContent='Selecciona un archivo.';return;}
  if(typeof XLSX==='undefined'){st.textContent='Motor Excel no cargado.';return;}
  st.textContent='Leyendo…';
  const r=new FileReader();
  r.onload=e=>{try{
    const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
    const sn=wb.SheetNames.find(n=>n.trim().toUpperCase()==='ALIMENTOS')||wb.SheetNames[0];
    const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{defval:''});
    if(!rows.length){st.textContent='Hoja vacía.';return;}
    const fk=(row,opts)=>Object.keys(row).find(k=>opts.some(o=>k.trim().toLowerCase().startsWith(o)));
    let added=0,updated=0;
    rows.forEach(row=>{
      const kN=fk(row,['aliment']),kP=fk(row,['prote']),kC=fk(row,['carbohid','carbo']),kG=fk(row,['grasa']),kK=fk(row,['calor','kcal']);
      if(!kN||!row[kN])return;
      const name=String(row[kN]).trim();
      const obj={protein:parseFloat(row[kP])||0,carbs:parseFloat(row[kC])||0,fat:parseFloat(row[kG])||0,kcal:parseFloat(row[kK])||0};
      const ex=DB.foods.find(f=>f.name.toLowerCase()===name.toLowerCase());
      if(ex){Object.assign(ex,obj);updated++;}else{DB.foods.push({id:uid('f'),name,...obj});added++;}
    });
    saveDB();st.textContent=`✓ ${added} nuevos, ${updated} actualizados.`;
    setTimeout(()=>{closeAll();renderFoods();toast(`+${added} añadidos, ${updated} actualizados`);},800);
  }catch(err){console.error(err);st.textContent='Error al leer el archivo.';}};
  r.readAsArrayBuffer(inp.files[0]);
}

  MEALS.forEach(meal=>{
    let mt={protein:0,carbs:0,fat:0,kcal:0};
    (ST.creatorItems[meal.id]||[]).forEach((it,idx)=>{
      const f=DB.foods.find(x=>x.id===it.foodId);if(!f)return;
      const fc=it.grams/100;
      const vP=r1(f.protein*fc),vC=r1(f.carbs*fc),vG=r1(f.fat*fc),vK=r1(f.kcal*fc);
      const eP=document.getElementById(`crP_${meal.id}_${idx}`);
      const eC=document.getElementById(`crC_${meal.id}_${idx}`);
      const eG=document.getElementById(`crG_${meal.id}_${idx}`);
      const eK=document.getElementById(`crK_${meal.id}_${idx}`);
      if(eP)eP.textContent=vP+'g';if(eC)eC.textContent=vC+'g';
      if(eG)eG.textContent=vG+'g';if(eK)eK.textContent=vK;
      mt.protein+=f.protein*fc;mt.carbs+=f.carbs*fc;mt.fat+=f.fat*fc;mt.kcal+=f.kcal*fc;
    });
    gt.protein+=mt.protein;gt.carbs+=mt.carbs;gt.fat+=mt.fat;gt.kcal+=mt.kcal;
  });
  const gp=document.getElementById('crGP'),gc=document.getElementById('crGC'),
        gg=document.getElementById('crGG'),gk=document.getElementById('crGK');
  if(gp)gp.textContent=r1(gt.protein)+'g';if(gc)gc.textContent=r1(gt.carbs)+'g';
  if(gg)gg.textContent=r1(gt.fat)+'g';if(gk)gk.textContent=r1(gt.kcal);
  const tkc=gt.kcal||1;
  const pP=Math.round((gt.protein*4/tkc)*100),cP=Math.round((gt.carbs*4/tkc)*100),gP=Math.round((gt.fat*9/tkc)*100);
  const bP=document.getElementById('crBP'),bC=document.getElementById('crBC'),bG=document.getElementById('crBG');
  const vP=document.getElementById('crVP'),vC=document.getElementById('crVC'),vG=document.getElementById('crVG');
  if(bP)bP.style.width=pP+'%';if(bC)bC.style.width=cP+'%';if(bG)bG.style.width=gP+'%';
  if(vP)vP.textContent=pP+'%';if(vC)vC.textContent=cP+'%';if(vG)vG.textContent=gP+'%';
}
function removeCreatorItem(mealId,idx){
  ST.creatorItems[mealId].splice(idx,1);renderCreator();
}
function clearCreator(){
  const total=MEALS.reduce((s,m)=>s+(ST.creatorItems[m.id]||[]).length,0);
  if(total===0){toast('El creador ya está vacío.');return;}
  if(!confirm('¿Borrar toda la dieta que estás configurando?'))return;
  MEALS.forEach(m=>ST.creatorItems[m.id]=[]);
  renderCreator();toast('Dieta borrada');
}
function openLoadMenu(){
  // Build list of all saved recipes
  const options=[];
  DB.menus.forEach(menu=>{
    PLANS.forEach(plan=>{
      PERSONS.forEach(person=>{
        const key=`${plan.id}:${menu.id}:${person.id}`;
        if(DB.recipes[key]){
          const total=MEALS.reduce((s,m)=>s+(DB.recipes[key].meals?.[m.id]||[]).length,0);
          if(total>0) options.push({key,menuName:menu.name,emoji:menu.emoji,planLabel:plan.label,personName:person.name});
        }
      });
    });
  });

  const listHtml=options.length===0
    ?`<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">No hay dietas guardadas aún.<br>Crea y guarda alguna primero.</div>`
    :options.map(o=>`
      <div class="picker-row" onclick="loadMenuIntoCreator('${o.key}',this.closest('.overlay'))">
        <div>
          <div class="fn">${o.emoji} ${esc(o.menuName)}</div>
          <div class="fc">${o.planLabel} · ${o.personName}</div>
        </div>
        <span style="font-size:16px">📥</span>
      </div>`).join('');

  const ov=mkOv(`<div class="sheet-handle"></div>
    <div class="sheet-title">📂 Importar menú guardado</div>
    <p style="font-size:13px;color:var(--mid);line-height:1.5;margin-bottom:12px">
      Carga una dieta existente como base y ajústala a tu gusto.
      <strong>Reemplaza</strong> lo que tengas en el creador ahora.
    </p>
    <div class="picker-search"><span>🔍</span><input placeholder="Buscar menú o persona…" oninput="filterLoadList(this.value)" id="loadSrch"></div>
    <div class="picker-list" id="loadList">${listHtml}</div>
    <button class="btn btn-secondary" onclick="this.closest('.overlay').remove()">Cancelar</button>
  `);
  ov._options=options;
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById('loadSrch')?.focus(),80);
}
function filterLoadList(term){
  const ov=document.querySelector('.overlay');if(!ov||!ov._options)return;
  const t=term.trim().toLowerCase();
  const filtered=ov._options.filter(o=>
    !t||o.menuName.toLowerCase().includes(t)||o.personName.toLowerCase().includes(t)||o.planLabel.toLowerCase().includes(t)
  );
  const wrap=document.getElementById('loadList');if(!wrap)return;
  wrap.innerHTML=filtered.length===0
    ?`<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">Sin resultados</div>`
    :filtered.map(o=>`
      <div class="picker-row" onclick="loadMenuIntoCreator('${o.key}',this.closest('.overlay'))">
        <div>
          <div class="fn">${o.emoji} ${esc(o.menuName)}</div>
          <div class="fc">${o.planLabel} · ${o.personName}</div>
        </div>
        <span style="font-size:16px">📥</span>
      </div>`).join('');
}
function loadMenuIntoCreator(key,ov){
  const recipe=DB.recipes[key];
  if(!recipe||!recipe.meals){ov.remove();toast('Dieta vacía.');return;}
  ST.creatorItems={desayuno:[],almuerzo:[],cena:[],merienda:[]};
  MEALS.forEach(m=>{
    ST.creatorItems[m.id]=(recipe.meals[m.id]||[]).map(it=>({...it}));
  });
  ov.remove();renderCreator();
  const total=MEALS.reduce((s,m)=>s+ST.creatorItems[m.id].length,0);
  toast(`Menú cargado · ${total} alimentos ✓`);
}
function openCreatorPicker(mealId){
  const ov=mkOv(`<div class="sheet-handle"></div>
    <div class="sheet-title">Añadir a ${MEALS.find(m=>m.id===mealId).label}</div>
    <div class="picker-search"><span>🔍</span><input id="cpSrch" placeholder="Buscar…" oninput="renderCreatorPL(this.value,'${mealId}',this.closest('.overlay'))"></div>
    <div class="picker-list" id="cPL"></div>
    <button class="btn btn-secondary" onclick="this.closest('.overlay').remove()">Cerrar</button>
  `);
  ov.onclick=e=>{if(e.target===ov)ov.remove();};document.body.appendChild(ov);
  renderCreatorPL('',mealId,ov);
  setTimeout(()=>document.getElementById('cpSrch').focus(),80);
}
function renderCreatorPL(term,mealId,ov){
  const t=term.trim().toLowerCase();
  const list=DB.foods.filter(f=>!t||f.name.toLowerCase().includes(t));
  const wrap=document.getElementById('cPL');if(!wrap)return;
  wrap.innerHTML=list.length===0
    ?`<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">Sin resultados</div>`
    :list.map(f=>`<div class="picker-row" onclick="addToCreator('${f.id}','${mealId}',this.closest('.overlay'))">
      <div><div class="fn">${esc(f.name)}</div><div class="fc">${f.kcal} kcal/100g · P${f.protein} C${f.carbs} G${f.fat}</div></div>
      <span style="font-size:18px">➕</span></div>`).join('');
}
function addToCreator(foodId,mealId,ov){
  const ex=ST.creatorItems[mealId].find(it=>it.foodId===foodId);
  if(ex)ex.grams+=100;else ST.creatorItems[mealId].push({foodId,grams:100});
  ov.remove();renderCreator();
}
function openImportCreator(){
  const total=MEALS.reduce((s,m)=>s+(ST.creatorItems[m.id]||[]).length,0);
  if(total===0){toast('Añade alimentos primero.');return;}
  const ov=mkOv(`<div class="sheet-handle"></div>
    <div class="sheet-title">💾 Guardar en menú</div>
    <p style="font-size:13px;color:var(--mid);line-height:1.55;margin-bottom:14px">Elige para quién, en qué menú y en qué plan guardar esta dieta.</p>
    <div class="field"><label>Para quién</label><select id="impPer">${PERSONS.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div>
    <div class="field"><label>Menú</label><select id="impMnu">${DB.menus.map(m=>`<option value="${m.id}">${m.emoji} ${esc(m.name)}</option>`).join('')}</select></div>
    <div class="field"><label>Plan</label><select id="impPln">${PLANS.map(p=>`<option value="${p.id}">${p.emoji} ${p.label}</option>`).join('')}</select></div>
    <div class="sheet-actions">
      <button class="btn btn-secondary" onclick="this.closest('.overlay').remove()">Cancelar</button>
      <button class="btn btn-primary" onclick="doImportCreator()">Guardar</button>
    </div>
  `);document.body.appendChild(ov);
}
function doImportCreator(){
  const pid=document.getElementById('impPer').value;
  const mid=document.getElementById('impMnu').value;
  const pln=document.getElementById('impPln').value;
  const recKey=`${pln}:${mid}:${pid}`;
  DB.recipes[recKey]={meals:JSON.parse(JSON.stringify(ST.creatorItems)),updatedAt:Date.now()};
  saveDB();closeAll();
  const p=PERSONS.find(x=>x.id===pid),m=DB.menus.find(x=>x.id===mid),pl=PLANS.find(x=>x.id===pln);
  toast(`Guardado: ${p.name} · ${m.name} · ${pl.label} ✓`);
  renderCreator();
}

// ═══════════════════════════════════════════
//  PROGRESO (sin gráfico, con deltas)
// ═══════════════════════════════════════════
function renderProgressPersons(){
  ST.screen='prog-persons';setNav('progress');clearFabs();
  setHeader('Progreso 📈','Selecciona a quién ver',false,null);
  const cards=PERSONS.map(p=>{
    const entries=DB.progress[p.id]||[];
    const last=entries.length?entries[entries.length-1]:null;
    return`<div class="prog-card" onclick="openProgDetail('${p.id}')">
      <div class="prog-avatar">${AV[p.svgKey]}</div>
      <div class="prog-name">${p.name}</div>
      <div class="prog-last">${last?last.weight+' kg':'Sin datos'}</div>
    </div>`;
  }).join('');
  document.getElementById('mainContent').innerHTML=`
    <div class="prog-persons">${cards}</div>
    <div style="background:#fff;border-radius:var(--r-xl);box-shadow:var(--sh);padding:16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.6">
      Toca una persona para ver su historial de medidas y evolución mes a mes.
    </div>
  `;
}
function openProgDetail(pid){
  ST.screen='prog-detail';ST.progPersonId=pid;
  const p=PERSONS.find(x=>x.id===pid);
  setHeader(p.name+' 📈','Evolución mensual',true,null);
  renderProgDetail();
  const fab=document.createElement('button');
  fab.className='fab';fab.textContent='+';fab.onclick=openAddEntry;
  document.body.appendChild(fab);
}
function renderProgDetail(){
  const pid=ST.progPersonId;
  const entries=(DB.progress[pid]||[]).slice().sort((a,b)=>a.date.localeCompare(b.date));
  const mn=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  function getDelta(entries,key,idx,customKey){
    if(idx===0)return null;
    const prev=entries[idx-1];const curr=entries[idx];
    const pv=customKey?prev.custom?.[customKey]:prev[key];
    const cv=customKey?curr.custom?.[customKey]:curr[key];
    if(pv==null||cv==null)return null;
    return parseFloat((cv-pv).toFixed(1));
  }
  function deltaChip(delta,higherIsBad){
    if(delta===null)return'';
    if(delta===0)return`<span class="ev-delta ev-same">= igual</span>`;
    const arrow=delta>0?'↑':'↓';
    const bad=(higherIsBad&&delta>0)||(!higherIsBad&&delta<0);
    const cls=bad?'ev-up':'ev-down';
    return`<span class="ev-delta ${cls}">${arrow} ${Math.abs(delta)}</span>`;
  }

  const rows=entries.length===0
    ?`<div class="empty-state"><div class="es-icon">📊</div><p>Sin registros aún.<br>Toca + para añadir el primero.</p></div>`
    :entries.slice().reverse().map((e,revIdx)=>{
        const realIdx=entries.length-1-revIdx;
        const [y,m,d]=e.date.split('-');
        // Separador: comparar mes del registro actual vs el que viene después (en orden cronológico inverso)
        const nextE=entries.slice().reverse()[revIdx-1];
        const nextYM=nextE?nextE.date.slice(0,7):null;
        const currYM=e.date.slice(0,7);
        const monthSep=nextYM&&nextYM!==currYM
          ?`<div style="display:flex;align-items:center;gap:10px;margin:6px 0">
              <div style="flex:1;height:2px;background:linear-gradient(90deg,transparent,var(--c3))"></div>
              <div style="font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:var(--cream);padding:3px 10px;border-radius:20px;border:1.5px solid var(--c2);white-space:nowrap">${mn[+m-1]} ${y}</div>
              <div style="flex:1;height:2px;background:linear-gradient(90deg,var(--c3),transparent)"></div>
            </div>`
          :'';
        const wDelta=getDelta(entries,'weight',realIdx,null);
        const waistDelta=getDelta(entries,'waist',realIdx,null);
        const cfItems=Object.entries(e.custom||{}).map(([k,v])=>{
          const def=DB.customFields.find(c=>c.key===k);
          if(!def)return'';
          const cDelta=getDelta(entries,null,realIdx,k);
          return`<div class="ev-item">
            <span class="ev-name">${esc(def.label)}:</span>
            <span class="ev-val">${v}${def.unit||''}</span>
            ${deltaChip(cDelta,true)}
          </div>`;
        }).join('');
        return`${monthSep}<div class="entry-row">
          <div class="entry-date"><div class="d1">${d}</div><div class="d2">${mn[+m-1]} ${y}</div></div>
          <div class="entry-vals">
            <div class="entry-measure-row">
              <div class="ev-item">
                <span class="ev-name">Peso:</span>
                <span class="ev-val">${e.weight} kg</span>
                ${deltaChip(wDelta,true)}
              </div>
              ${e.waist!=null?`<div class="ev-item">
                <span class="ev-name">Cintura:</span>
                <span class="ev-val">${e.waist} cm</span>
                ${deltaChip(waistDelta,true)}
              </div>`:''}
            </div>
            ${cfItems?`<div class="entry-measure-row">${cfItems}</div>`:''}
          </div>
          <button class="entry-del" onclick="deleteEntry('${e.id}')">🗑️</button>
        </div>`;
      }).join('');

  document.getElementById('mainContent').innerHTML=`
    <p class="label">Historial de medidas</p>
    <div class="entry-list">${rows}</div>
  `;
}
function openAddEntry(){
  const today=new Date().toISOString().slice(0,10);
  const cfHtml=DB.customFields.map(cf=>`
    <div class="field"><label>${esc(cf.label)}${cf.unit?' ('+cf.unit+')':''}</label>
    <input type="number" step="0.1" id="cf_${cf.key}" placeholder="Opcional"></div>
  `).join('');
  const ov=mkOv(`<div class="sheet-handle"></div>
    <div class="sheet-title">Nuevo registro</div>
    <div class="field"><label>Fecha</label><input type="date" id="peDate" value="${today}"></div>
    <div class="field-row">
      <div class="field"><label>Peso (kg)</label><input type="number" step="0.1" id="peWeight" placeholder="ej. 72.5"></div>
      <div class="field"><label>Cintura (cm)</label><input type="number" step="0.1" id="peWaist" placeholder="ej. 85"></div>
    </div>
    ${cfHtml}
    <p class="label" style="margin-top:6px">Añadir medida personalizada</p>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <div class="field" style="margin-bottom:0;flex:1"><input id="nCfL" placeholder="Ej. Cadera"></div>
      <div class="field" style="margin-bottom:0;width:64px"><input id="nCfU" placeholder="cm"></div>
      <button style="background:var(--g2);color:#fff;border:none;border-radius:var(--r-md);width:42px;height:42px;font-size:20px;cursor:pointer;flex-shrink:0" onclick="addCF()">+</button>
    </div>
    <div class="sheet-actions">
      <button class="btn btn-secondary" onclick="this.closest('.overlay').remove()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEntry()">Guardar</button>
    </div>
  `);document.body.appendChild(ov);
}
function addCF(){
  const lbl=document.getElementById('nCfL').value.trim();if(!lbl)return;
  const unit=document.getElementById('nCfU').value.trim();
  const key='cf_'+lbl.toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,18)+'_'+Math.random().toString(36).slice(2,5);
  DB.customFields.push({key,lbl,label:lbl,unit});saveDB();
  const ov=document.querySelector('.overlay');
  const dv=document.getElementById('peDate').value,wv=document.getElementById('peWeight').value,waiv=document.getElementById('peWaist').value;
  ov.remove();openAddEntry();
  document.getElementById('peDate').value=dv;document.getElementById('peWeight').value=wv;document.getElementById('peWaist').value=waiv;
}
function saveEntry(){
  const date=document.getElementById('peDate').value;
  const weight=parseFloat(document.getElementById('peWeight').value);
  const waist=parseFloat(document.getElementById('peWaist').value)||null;
  if(!date||!weight){alert('Fecha y peso son obligatorios.');return;}
  const custom={};
  DB.customFields.forEach(cf=>{const el=document.getElementById('cf_'+cf.key);if(el&&el.value!=='')custom[cf.key]=parseFloat(el.value);});
  DB.progress[ST.progPersonId].push({id:uid('e'),date,weight,waist,custom});
  saveDB();closeAll();renderProgDetail();toast('Registro guardado ✓');
}
function deleteEntry(eid){
  if(!confirm('¿Eliminar registro?'))return;
  DB.progress[ST.progPersonId]=DB.progress[ST.progPersonId].filter(e=>e.id!==eid);
  saveDB();renderProgDetail();
}

// ═══════════════════════════════════════════
//  HELPER: crear overlay
// ═══════════════════════════════════════════
function mkOv(innerHtml){
  const ov=document.createElement('div');ov.className='overlay open';
  ov.innerHTML=`<div class="sheet"><div class="sheet-handle"></div>${innerHtml}</div>`;
  ov.onclick=e=>{if(e.target===ov)ov.remove();};
  return ov;
}

navigate('home');
